version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck   # includes gosimple
    - ineffassign
    - unused
    - gosec
    - bodyclose
    - noctx
  settings:
    gosec:
      excludes:
        - G401
        - G706  # log injection false positive for standard HTTP request logging
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - gosec
