version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck   # includes gosimple
    - ineffassign
    - unused
    - gosec
    - bodyclose
    - noctx

linters-settings:
  gosec:
    excludes:
      - G401
      - G706  # log injection false positive for standard HTTP request logging

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
